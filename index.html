<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d10">
<title>工作週誌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d10;
  --s1: #15151a;
  --s2: #1c1c23;
  --s3: #23232c;
  --border: #2c2c38;
  --border2: #383848;
  --accent: #6c63e8;
  --accent-dim: rgba(108,99,232,0.12);
  --green: #3dd68c;
  --green-dim: rgba(61,214,140,0.1);
  --yellow: #f5a623;
  --yellow-dim: rgba(245,166,35,0.1);
  --blue: #5bb8f5;
  --blue-dim: rgba(91,184,245,0.1);
  --muted: #888898;
  --muted2: #4a4a5a;
  --text: #e2e2ee;
  --text2: #a0a0b8;
  --red: #e85c5c;
  --radius: 14px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px}

/* ── View system ── */
.view{display:none;height:100%;flex-direction:column}
.view.active{display:flex}

/* ── Bottom Nav ── */
.bottom-nav{
  display:flex;flex-shrink:0;
  background:var(--s1);
  border-top:1px solid var(--border);
  padding:0 0 env(safe-area-inset-bottom);
  position:relative;z-index:50;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;gap:3px;cursor:pointer;
  color:var(--muted2);font-size:10px;letter-spacing:.3px;
  transition:color .15s;
  -webkit-user-select:none;user-select:none;
}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* ── Header ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 12px;
  padding-top:calc(14px + env(safe-area-inset-top));
  background:rgba(13,13,16,0.9);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:40;
}
.topbar-title{font-size:16px;font-weight:700;letter-spacing:-.2px}
.topbar-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.week-btns{display:flex;gap:6px}
.wbtn{
  width:32px;height:32px;border-radius:var(--radius-sm);
  background:var(--s2);border:1px solid var(--border);
  color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.wbtn:active{background:var(--border);transform:scale(.93)}

/* ── Scroll areas ── */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 24px}
.scroll-area::-webkit-scrollbar{display:none}

/* ── Day cards ── */
.day-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;
  overflow:hidden;
  transition:border-color .2s;
}
.day-card.today-card{border-color:rgba(61,214,140,0.3)}
.day-hdr{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;cursor:pointer;
  -webkit-user-select:none;user-select:none;
}
.day-hdr:active{background:var(--s2)}
.day-pip{width:9px;height:9px;border-radius:50%;background:var(--border2);flex-shrink:0}
.day-pip.today{background:var(--green);box-shadow:0 0 8px var(--green)}
.day-meta{flex:1}
.day-name-row{display:flex;align-items:center;gap:8px}
.day-wk{font-size:13px;font-weight:700}
.day-dt{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.day-tag{font-size:10px;color:var(--green);background:var(--green-dim);padding:1px 6px;border-radius:20px;font-weight:500}
.day-cnt{font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace;margin-right:4px}
.day-chevron{color:var(--muted2);font-size:11px;transition:transform .2s;flex-shrink:0}
.day-card.collapsed .day-chevron{transform:rotate(-90deg)}
.day-card.collapsed .day-body{display:none}

.day-body{padding:0 12px 12px}

/* ── Task item ── */
.task-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:9px 8px;border-radius:var(--radius-sm);
  border:1px solid transparent;
  margin-bottom:3px;
  cursor:grab;
  transition:background .12s, border-color .12s;
  touch-action:none;
}
.task-item:active{cursor:grabbing}
.task-item.touch-dragging{
  opacity:.35;transform:scale(.97);
}
.task-handle{
  color:var(--muted2);font-size:14px;margin-top:1px;
  flex-shrink:0;cursor:grab;
  padding:2px 0;
}
.task-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.task-body{flex:1;min-width:0}
.task-txt{font-size:13px;line-height:1.55;color:var(--text);word-break:break-word}
.task-subs{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.task-sub{
  font-size:12px;color:var(--text2);line-height:1.5;
  padding-left:10px;position:relative;word-break:break-word;
}
.task-sub::before{content:'·';position:absolute;left:2px;color:var(--muted2)}

/* drag hover on day */
.day-body.drag-target{background:rgba(108,99,232,0.05);border-radius:var(--radius-sm)}

.add-task-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 8px;color:var(--muted2);font-size:13px;
  cursor:pointer;border-radius:var(--radius-sm);
  border:1px dashed transparent;
  transition:all .15s;margin-top:4px;
  -webkit-user-select:none;user-select:none;
}
.add-task-row:active{background:var(--s2);border-color:var(--border);color:var(--text2)}

/* ── Kanban view ── */
.kanban-scroll{
  flex:1;overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  display:flex;gap:12px;
  padding:14px 16px 24px;
  scroll-snap-type:x mandatory;
}
.kanban-scroll::-webkit-scrollbar{display:none}

.klane{
  flex-shrink:0;width:80vw;max-width:300px;
  display:flex;flex-direction:column;
  scroll-snap-align:start;
}
.klane-hdr{
  display:flex;align-items:center;gap:7px;
  padding:10px 14px;
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--radius) var(--radius) 0 0;
  border-bottom:none;
  flex-shrink:0;
}
.klane-pip{width:8px;height:8px;border-radius:50%}
.klane-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.klane-cnt{margin-left:auto;font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace}

.klane-body{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:0 0 var(--radius) var(--radius);
  padding:10px;
  min-height:200px;
  transition:background .15s;
}
.klane-body::-webkit-scrollbar{display:none}
.klane-body.drag-over{background:var(--s2)}

.klane-empty{
  color:var(--muted2);font-size:11px;text-align:center;
  padding:20px 0;border:1px dashed var(--border);
  border-radius:var(--radius-sm);
}

/* lane colors */
.lane-inprogress .klane-pip{background:var(--yellow)}
.lane-inprogress .klane-title{color:var(--yellow)}
.lane-done .klane-pip{background:var(--green)}
.lane-done .klane-title{color:var(--green)}
.lane-discuss .klane-pip{background:var(--blue)}
.lane-discuss .klane-title{color:var(--blue)}
.lane-plan .klane-pip{background:var(--muted2)}
.lane-plan .klane-title{color:var(--text2)}

/* lane card */
.lcard{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:10px 12px;margin-bottom:8px;
  cursor:grab;
  transition:border-color .15s, transform .1s;
  touch-action:none;
  position:relative;
}
.lcard:active{cursor:grabbing}
.lcard.touch-dragging{opacity:.3}
.lcard-day{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:3px}
.lcard-txt{font-size:12px;line-height:1.5;color:var(--text);padding-right:18px}
.lcard-icon{font-size:13px;margin-right:4px}
.lcard-del{
  position:absolute;top:8px;right:8px;
  color:var(--muted2);font-size:11px;cursor:pointer;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;transition:all .15s;
}
.lcard-del:active{background:rgba(232,92,92,0.15);color:var(--red)}

/* Ghost card for touch drag */
#drag-ghost{
  position:fixed;z-index:9999;pointer-events:none;
  background:var(--s2);border:1px solid var(--accent);
  border-radius:var(--radius-sm);padding:10px 12px;
  font-size:12px;color:var(--text);
  max-width:240px;opacity:.9;
  transform:rotate(2deg);
  box-shadow:0 8px 30px rgba(0,0,0,.5);
  display:none;
}

/* ── Modal ── */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:100;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal-sheet{
  width:100%;background:var(--s1);
  border-radius:20px 20px 0 0;
  border:1px solid var(--border);border-bottom:none;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.modal-backdrop.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-input{
  width:100%;background:var(--s2);border:1px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:var(--radius-sm);
  font-size:14px;font-family:'Noto Sans TC',sans-serif;
  outline:none;resize:none;
  -webkit-appearance:none;appearance:none;
}
.modal-input:focus{border-color:var(--accent)}
.modal-select{
  width:100%;background:var(--s2);border:1px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:var(--radius-sm);
  font-size:14px;font-family:'Noto Sans TC',sans-serif;
  outline:none;margin:10px 0 16px;cursor:pointer;
  -webkit-appearance:none;appearance:none;
}
.modal-btns{display:flex;gap:10px}
.mbtn{
  flex:1;padding:13px;border-radius:var(--radius-sm);
  font-size:14px;font-family:'Noto Sans TC',sans-serif;
  font-weight:500;cursor:pointer;border:none;
  transition:all .15s;
}
.mbtn:active{transform:scale(.97)}
.mbtn-cancel{background:var(--s2);color:var(--text2);border:1px solid var(--border)}
.mbtn-ok{background:var(--accent);color:#fff}

/* ── Floating add button ── */
.fab{
  position:fixed;right:20px;
  bottom:calc(70px + env(safe-area-inset-bottom));
  width:52px;height:52px;border-radius:50%;
  background:var(--accent);color:#fff;
  font-size:24px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:30;
  box-shadow:0 4px 20px rgba(108,99,232,.45);
  transition:transform .15s,box-shadow .15s;
  border:none;
  -webkit-user-select:none;user-select:none;
}
.fab:active{transform:scale(.92);box-shadow:0 2px 10px rgba(108,99,232,.3)}
.fab.hidden{display:none}
</style>
</head>
<body>

<!-- Ghost for touch drag -->
<div id="drag-ghost"></div>

<!-- ════════════════════════════ VIEW: DAYS ════════════════════════════ -->
<div class="view active" id="view-days">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="weekLabel">載入中…</div>
      <div class="topbar-sub" id="weekSub"></div>
    </div>
    <div class="week-btns">
      <button class="wbtn" onclick="changeWeek(-1)">‹</button>
      <button class="wbtn" onclick="changeWeek(0)" style="font-size:11px;font-family:'DM Mono',monospace">今</button>
      <button class="wbtn" onclick="changeWeek(1)">›</button>
    </div>
  </div>
  <div class="scroll-area" id="daysScroll"></div>
  <button class="fab" id="fab-days" onclick="openModal(null)">＋</button>
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchView('days')"><div class="nav-icon">📅</div>週誌</div>
    <div class="nav-item" onclick="switchView('kanban')"><div class="nav-icon">🗂</div>看板</div>
  </nav>
</div>

<!-- ════════════════════════════ VIEW: KANBAN ════════════════════════════ -->
<div class="view" id="view-kanban">
  <div class="topbar">
    <div>
      <div class="topbar-title">看板</div>
      <div class="topbar-sub" id="kanbanWeekSub"></div>
    </div>
    <div class="week-btns">
      <button class="wbtn" onclick="changeWeek(-1)">‹</button>
      <button class="wbtn" onclick="changeWeek(0)" style="font-size:11px;font-family:'DM Mono',monospace">今</button>
      <button class="wbtn" onclick="changeWeek(1)">›</button>
    </div>
  </div>
  <div class="kanban-scroll" id="kanbanScroll"></div>
  <nav class="bottom-nav">
    <div class="nav-item" onclick="switchView('days')"><div class="nav-icon">📅</div>週誌</div>
    <div class="nav-item active" onclick="switchView('kanban')"><div class="nav-icon">🗂</div>看板</div>
  </nav>
</div>

<!-- ════════════════════════════ MODAL ════════════════════════════ -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">新增任務</div>
    <textarea class="modal-input" id="modalInput" rows="3" placeholder="輸入任務內容…"></textarea>
    <select class="modal-select" id="modalIcon">
      <option value="🚩">🚩 重要任務</option>
      <option value="📋">📋 一般任務</option>
      <option value="🔧">🔧 技術項目</option>
      <option value="💬">💬 討論項目</option>
      <option value="📝">📝 文件 / 報告</option>
      <option value="✅">✅ 已完成</option>
    </select>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">取消</button>
      <button class="mbtn mbtn-ok" onclick="confirmAdd()">新增</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   Constants & helpers
══════════════════════════════════════════════ */
const WD = ['一','二','三','四','五','六','日'];
const LANES = [
  {id:'inprogress', label:'進行中'},
  {id:'done',       label:'已完成'},
  {id:'discuss',    label:'待討論'},
  {id:'plan',       label:'待規劃'},
];

let weekOffset = 0;
let currentView = 'days';
let modalDayKey = null;

function uid(){ return Math.random().toString(36).slice(2,9); }

/* ── Store ── */
function loadStore(){
  try{ return JSON.parse(localStorage.getItem('wp2')||'{}'); }catch{ return {}; }
}
function saveStore(){ localStorage.setItem('wp2', JSON.stringify(store)); }
let store = loadStore();

function wkKey(off=weekOffset){
  const m = monday(off);
  return `${m.getFullYear()}-W${String(isoWeek(m)).padStart(2,'0')}`;
}
function ensureWk(wk=wkKey()){
  if(!store[wk]) store[wk]={days:{},lanes:{done:[],inprogress:[],discuss:[],plan:[]}};
  if(!store[wk].lanes) store[wk].lanes={done:[],inprogress:[],discuss:[],plan:[]};
  return store[wk];
}
function monday(off=0){
  const n=new Date(); const d=n.getDay(); const diff=d===0?-6:1-d;
  const m=new Date(n); m.setDate(n.getDate()+diff+off*7); m.setHours(0,0,0,0); return m;
}
function isoWeek(d){
  const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dn=u.getUTCDay()||7; u.setUTCDate(u.getUTCDate()+4-dn);
  const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));
  return Math.ceil((((u-y)/86400000)+1)/7);
}
function dayKey(d){ return d.toISOString().slice(0,10); }

/* ══════════════════════════════════════════════
   Views
══════════════════════════════════════════════ */
function switchView(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(el=>{
    el.classList.toggle('active', el.id==='view-'+v);
  });
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    el.classList.toggle('active', (i===0&&v==='days')||(i===1&&v==='kanban'));
  });
  const fab=document.getElementById('fab-days');
  if(fab) fab.classList.toggle('hidden', v!=='days');
  render();
}

/* ══════════════════════════════════════════════
   Render
══════════════════════════════════════════════ */
function render(){
  const wk=wkKey(); ensureWk(wk);
  const mon=monday();
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const wLabel=`第 ${isoWeek(mon)} 週`;
  const wSub=`${mon.getFullYear()}  ${fmt(mon)} – ${fmt(sun)}`;
  document.getElementById('weekLabel').textContent=wLabel;
  document.getElementById('weekSub').textContent=wSub;
  document.getElementById('kanbanWeekSub').textContent=wSub;

  if(currentView==='days') renderDays(wk,mon);
  else renderKanban(wk,mon);
}

/* ── Days ── */
function renderDays(wk,mon){
  const col=document.getElementById('daysScroll');
  col.innerHTML='';
  const today=new Date(); today.setHours(0,0,0,0);

  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const dk=dayKey(d);
    const isToday=d.getTime()===today.getTime();
    if(!store[wk].days[dk]) store[wk].days[dk]=[];
    const tasks=store[wk].days[dk];

    const card=document.createElement('div');
    card.className='day-card'+(isToday?' today-card':'');

    // header
    const hdr=document.createElement('div');
    hdr.className='day-hdr';
    hdr.innerHTML=`
      <div class="day-pip${isToday?' today':''}"></div>
      <div class="day-meta">
        <div class="day-name-row">
          <span class="day-wk">週${WD[i]}</span>
          <span class="day-dt">${d.getMonth()+1}/${d.getDate()}</span>
          ${isToday?'<span class="day-tag">今天</span>':''}
        </div>
      </div>
      <span class="day-cnt">${tasks.length}</span>
      <span class="day-chevron">▾</span>`;
    hdr.onclick=()=>card.classList.toggle('collapsed');
    card.appendChild(hdr);

    // body
    const body=document.createElement('div');
    body.className='day-body';
    body.dataset.dk=dk;
    setupDayDropZone(body,dk);

    tasks.forEach(t=>body.appendChild(makeTaskEl(t,dk)));

    const addRow=document.createElement('div');
    addRow.className='add-task-row';
    addRow.innerHTML='＋ 新增任務';
    addRow.onclick=()=>openModal(dk);
    body.appendChild(addRow);
    card.appendChild(body);

    // default collapse weekends with no tasks
    if(i>=5 && !isToday && tasks.length===0) card.classList.add('collapsed');
    col.appendChild(card);
  }
}

function makeTaskEl(task,dk){
  const el=document.createElement('div');
  el.className='task-item';
  el.dataset.tid=task.id; el.dataset.dk=dk;

  const subsHtml=(task.subs||[]).map(s=>`<div class="task-sub">${s}</div>`).join('');
  el.innerHTML=`
    <span class="task-handle">⠿</span>
    <span class="task-icon">${task.icon}</span>
    <div class="task-body">
      <div class="task-txt">${task.text}</div>
      ${subsHtml?`<div class="task-subs">${subsHtml}</div>`:''}
    </div>`;

  setupTaskDrag(el,task,dk);
  return el;
}

/* ── Kanban ── */
function renderKanban(wk,mon){
  const scroll=document.getElementById('kanbanScroll');
  scroll.innerHTML='';
  const today=new Date(); today.setHours(0,0,0,0);

  LANES.forEach(({id,label})=>{
    const cards=store[wk].lanes[id]||[];
    const col=document.createElement('div');
    col.className=`klane lane-${id}`;

    col.innerHTML=`
      <div class="klane-hdr">
        <div class="klane-pip"></div>
        <div class="klane-title">${label}</div>
        <div class="klane-cnt" id="kcnt-${id}">${cards.length}</div>
      </div>`;

    const body=document.createElement('div');
    body.className='klane-body';
    body.id=`klane-${id}`;
    setupLaneDropZone(body,id,wk);

    if(cards.length===0){
      body.innerHTML=`<div class="klane-empty">拖曳任務至此</div>`;
    } else {
      cards.forEach(c=>body.appendChild(makeLaneCard(c,id,wk)));
    }

    col.appendChild(body);
    scroll.appendChild(col);
  });
}

function makeLaneCard(card,lane,wk){
  const el=document.createElement('div');
  el.className='lcard';
  el.dataset.cid=card.id; el.dataset.lane=lane;
  el.innerHTML=`
    <div class="lcard-day">${card.dayLabel||''}</div>
    <div class="lcard-txt"><span class="lcard-icon">${card.icon}</span>${card.text}</div>
    <div class="lcard-del" data-cid="${card.id}" data-lane="${lane}">✕</div>`;
  el.querySelector('.lcard-del').addEventListener('touchend',e=>{
    e.preventDefault(); e.stopPropagation();
    removeCard(card.id,lane,wk);
  });
  el.querySelector('.lcard-del').onclick=e=>{
    e.stopPropagation(); removeCard(card.id,lane,wk);
  };
  setupCardDrag(el,card,lane,wk);
  return el;
}

function removeCard(cid,lane,wk=wkKey()){
  store[wk].lanes[lane]=store[wk].lanes[lane].filter(c=>c.id!==cid);
  saveStore(); renderKanban(wk,monday());
}

/* ══════════════════════════════════════════════
   Drag & Drop — unified mouse + touch
══════════════════════════════════════════════ */
let drag={active:false,type:null,data:null,ghost:null};

const ghost=document.getElementById('drag-ghost');

function showGhost(txt,x,y){
  ghost.textContent=txt;
  ghost.style.display='block';
  moveGhost(x,y);
}
function moveGhost(x,y){
  ghost.style.left=(x+14)+'px';
  ghost.style.top=(y-20)+'px';
}
function hideGhost(){ ghost.style.display='none'; }

function getEventCoords(e){
  if(e.touches&&e.touches.length) return {x:e.touches[0].clientX,y:e.touches[0].clientY};
  if(e.changedTouches&&e.changedTouches.length) return {x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  return {x:e.clientX,y:e.clientY};
}

/* ── Task drag (from day list → kanban lane) ── */
function setupTaskDrag(el,task,dk){
  // Mouse
  el.addEventListener('mousedown',e=>{
    if(e.button!==0) return;
    drag={active:true,type:'task',data:{task,dk},el};
    el.classList.add('touch-dragging');
    showGhost(task.icon+' '+task.text,e.clientX,e.clientY);
    e.preventDefault();
  });
  // Touch
  let touchTimer;
  el.addEventListener('touchstart',e=>{
    const {x,y}=getEventCoords(e);
    touchTimer=setTimeout(()=>{
      drag={active:true,type:'task',data:{task,dk},el};
      el.classList.add('touch-dragging');
      showGhost(task.icon+' '+task.text,x,y);
      if(navigator.vibrate) navigator.vibrate(30);
    },300);
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    clearTimeout(touchTimer);
    if(!drag.active) return;
    const {x,y}=getEventCoords(e);
    moveGhost(x,y);
    e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',e=>{
    clearTimeout(touchTimer);
    if(!drag.active||drag.type!=='task'){drag.active=false;return;}
    const {x,y}=getEventCoords(e);
    const laneId=getLaneAtPoint(x,y);
    if(laneId) dropTaskToLane(task,dk,laneId);
    endDrag(el);
  });
}

/* ── Lane drop zone ── */
function setupLaneDropZone(body,laneId,wk){
  body.addEventListener('mouseover',()=>{ if(drag.active) body.classList.add('drag-over'); });
  body.addEventListener('mouseout', ()=>body.classList.remove('drag-over'));
  body.addEventListener('mouseup',()=>{
    body.classList.remove('drag-over');
    if(!drag.active) return;
    if(drag.type==='task') dropTaskToLane(drag.data.task,drag.data.dk,laneId,wk);
    else if(drag.type==='card' && drag.data.fromLane!==laneId) moveCard(drag.data.card,drag.data.fromLane,laneId,wk);
    endDrag(drag.el);
  });
  // desktop drag events
  body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');});
  body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
  body.addEventListener('drop',e=>{
    e.preventDefault(); body.classList.remove('drag-over');
    if(!drag.active) return;
    if(drag.type==='task') dropTaskToLane(drag.data.task,drag.data.dk,laneId,wk);
    else if(drag.type==='card' && drag.data.fromLane!==laneId) moveCard(drag.data.card,drag.data.fromLane,laneId,wk);
    endDrag(drag.el);
  });
}

function getLaneAtPoint(x,y){
  for(const {id} of LANES){
    const el=document.getElementById('klane-'+id);
    if(!el) continue;
    const r=el.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) return id;
  }
  return null;
}

function dropTaskToLane(task,dk,laneId,wk=wkKey()){
  ensureWk(wk);
  const d=new Date(dk);
  const dIdx=d.getDay()===0?6:d.getDay()-1;
  const dayLabel=`${d.getMonth()+1}/${d.getDate()} 週${WD[dIdx]}`;
  const newCard={id:uid(),icon:task.icon,text:task.text,dayLabel};
  store[wk].lanes[laneId].push(newCard);
  saveStore();
  if(currentView==='kanban') renderKanban(wk,monday());
}

/* ── Card drag (within kanban) ── */
function setupCardDrag(el,card,lane,wk){
  el.addEventListener('mousedown',e=>{
    if(e.button!==0||e.target.classList.contains('lcard-del')) return;
    drag={active:true,type:'card',data:{card,fromLane:lane},el};
    el.classList.add('touch-dragging');
    showGhost(card.icon+' '+card.text,e.clientX,e.clientY);
    e.preventDefault();
  });
  let touchTimer2;
  el.addEventListener('touchstart',e=>{
    if(e.target.classList.contains('lcard-del')) return;
    const {x,y}=getEventCoords(e);
    touchTimer2=setTimeout(()=>{
      drag={active:true,type:'card',data:{card,fromLane:lane},el};
      el.classList.add('touch-dragging');
      showGhost(card.icon+' '+card.text,x,y);
      if(navigator.vibrate) navigator.vibrate(30);
    },300);
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    clearTimeout(touchTimer2);
    if(!drag.active) return;
    const {x,y}=getEventCoords(e);
    moveGhost(x,y);
    e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',e=>{
    clearTimeout(touchTimer2);
    if(!drag.active||drag.type!=='card'){drag.active=false;return;}
    const {x,y}=getEventCoords(e);
    const targetLane=getLaneAtPoint(x,y);
    if(targetLane && targetLane!==lane) moveCard(card,lane,targetLane,wk);
    endDrag(el);
  });
}

function moveCard(card,fromLane,toLane,wk=wkKey()){
  store[wk].lanes[fromLane]=store[wk].lanes[fromLane].filter(c=>c.id!==card.id);
  store[wk].lanes[toLane].push(card);
  saveStore();
  renderKanban(wk,monday());
}

/* ── Day drop (task reorder) ── */
function setupDayDropZone(body,dk){
  body.addEventListener('mouseup',()=>{
    if(!drag.active||drag.type!=='task') return;
    const {task,dk:fromDk}=drag.data;
    if(fromDk===dk) return;
    moveDayTask(task,fromDk,dk);
  });
}
function moveDayTask(task,fromDk,toDk){
  const wk=wkKey(); ensureWk(wk);
  store[wk].days[fromDk]=store[wk].days[fromDk].filter(t=>t.id!==task.id);
  if(!store[wk].days[toDk]) store[wk].days[toDk]=[];
  store[wk].days[toDk].push(task);
  saveStore(); renderDays(wk,monday());
}

function endDrag(el){
  drag.active=false; drag.type=null;
  if(el) el.classList.remove('touch-dragging');
  hideGhost();
  // clear all drag-over
  document.querySelectorAll('.drag-over,.drag-target').forEach(e=>{
    e.classList.remove('drag-over','drag-target');
  });
}

// Global mouse up / move
document.addEventListener('mousemove',e=>{
  if(drag.active) moveGhost(e.clientX,e.clientY);
});
document.addEventListener('mouseup',()=>{
  if(drag.active) endDrag(drag.el);
});

/* ══════════════════════════════════════════════
   Modal
══════════════════════════════════════════════ */
function openModal(dk){
  modalDayKey=dk;
  if(dk){
    const d=new Date(dk);
    const dIdx=d.getDay()===0?6:d.getDay()-1;
    document.getElementById('modalTitle').textContent=`新增任務 · ${d.getMonth()+1}/${d.getDate()} 週${WD[dIdx]}`;
  } else {
    // pick today or monday
    const today=new Date(); today.setHours(0,0,0,0);
    const mon=monday();
    modalDayKey=dayKey(today)>=dayKey(mon)?dayKey(today):dayKey(mon);
    document.getElementById('modalTitle').textContent='新增任務';
  }
  document.getElementById('modalInput').value='';
  document.getElementById('modalBackdrop').classList.add('open');
  setTimeout(()=>document.getElementById('modalInput').focus(),350);
}
function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('open');
  modalDayKey=null;
}
function confirmAdd(){
  const text=document.getElementById('modalInput').value.trim();
  const icon=document.getElementById('modalIcon').value;
  if(!text||!modalDayKey){closeModal();return;}
  const wk=wkKey(); ensureWk(wk);
  if(!store[wk].days[modalDayKey]) store[wk].days[modalDayKey]=[];
  store[wk].days[modalDayKey].push({id:uid(),icon,text,subs:[]});
  saveStore(); closeModal(); render();
}
document.getElementById('modalBackdrop').addEventListener('click',e=>{
  if(e.target===e.currentTarget) closeModal();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ══════════════════════════════════════════════
   Week nav
══════════════════════════════════════════════ */
function changeWeek(off){
  if(off===0) weekOffset=0; else weekOffset+=off;
  render();
}

/* ══════════════════════════════════════════════
   Seed 3/23 data
══════════════════════════════════════════════ */
function seed(){
  const wk=wkKey(); ensureWk(wk);
  const mon=monday();
  let target=null;
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    if(d.getMonth()===2&&d.getDate()===23){target=dayKey(d);break;}
  }
  if(!target) target=dayKey(mon);
  if(!store[wk].days[target]||store[wk].days[target].length===0){
    store[wk].days[target]=[
      {id:uid(),icon:'🚩',text:'Bump AI Studio',subs:[
        '教學手冊補充項目已完成，待學長們驗證後更新',
        '參考 issues/30#note_18734',
        '會議統整 PDF 內容確認'
      ]},
      {id:uid(),icon:'🚩',text:'擬定 Server 健康度監控討論項目',subs:[
        '已與宏魁哥初步確認',
        '部分問題列入待討論'
      ]},
      {id:uid(),icon:'🚩',text:'與永欽哥約時間討論',subs:[
        '1. 專案決策與方向',

}
