<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111318">
<title>工作週誌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<!-- DOMPurify for safe HTML -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
:root{
  --bg:#111318;--s1:#181c24;--s2:#1f2330;--s3:#262d3d;
  --bd:#2e3448;--bd2:#3d4560;
  --acc:#5b6af0;--acc-h:#7b88ff;--acc-dim:rgba(91,106,240,.15);
  --grn:#2dd4a0;--grn-dim:rgba(45,212,160,.12);
  --ylw:#f0a500;--ylw-dim:rgba(240,165,0,.12);
  --blu:#38b6f5;--blu-dim:rgba(56,182,245,.12);
  --red:#f05b5b;--red-dim:rgba(240,91,91,.12);
  --txt:#dde1f0;--txt2:#8890ab;--txt3:#454e68;
  --r:14px;--rs:8px;
  --font:'Noto Sans TC',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:15px}
button{font-family:var(--font)}

/* ── layout ── */
#app{display:flex;flex-direction:column;height:100%}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top));background:rgba(17,19,24,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);flex-shrink:0;z-index:60}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{font-family:var(--mono);font-size:11px;color:var(--acc);background:var(--acc-dim);border:1px solid rgba(91,106,240,.3);padding:3px 9px;border-radius:5px;letter-spacing:1px;text-transform:uppercase}
.tb-info{display:flex;flex-direction:column}
.tb-week{font-size:16px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.tb-sub{font-size:11px;color:var(--txt3);font-family:var(--mono);margin-top:1px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--txt3);transition:background .3s;flex-shrink:0}
.sync-dot.live{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.sync-dot.saving{background:var(--ylw);animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tb-nav{display:flex;gap:5px}
.nbtn{width:32px;height:32px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--bd);color:var(--txt2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nbtn:hover{background:var(--s3);color:var(--txt)}
.nbtn:active{transform:scale(.9)}
.nbtn.today{font-size:10px;font-family:var(--mono);width:auto;padding:0 9px}

/* panes */
.panes{flex:1;display:flex;overflow:hidden}
.pane-days{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.pane-days .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 100px}
.pane-days .scroll::-webkit-scrollbar{width:4px}
.pane-days .scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:9px}
.pane-kb{width:270px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--bd);overflow:hidden;background:var(--s1)}
.pane-kb .kscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pane-kb .kscroll::-webkit-scrollbar{width:3px}
.pane-kb .kscroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:9px}

/* tab bar */
.tab-bar{display:none;flex-shrink:0;background:var(--s1);border-top:1px solid var(--bd);padding:0 0 env(safe-area-inset-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 0 7px;cursor:pointer;color:var(--txt3);font-size:10px;transition:color .15s;-webkit-user-select:none;user-select:none}
.tab-item.active{color:var(--acc)}
.tab-icon{font-size:20px;line-height:1}
@media(max-width:680px){
  .pane-kb{display:none;position:fixed;inset:0;top:auto;height:65vh;width:100%;border:none;border-top:1px solid var(--bd);z-index:55;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1)}
  .pane-kb.open{transform:translateY(0);display:flex}
  .tab-bar{display:flex}
  .tb-logo{display:none}
}

/* ── day card ── */
.day-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.day-card.today-card{border-color:rgba(45,212,160,.35);box-shadow:0 0 0 1px rgba(45,212,160,.08)}
.day-card.drag-target-day{border-color:var(--acc);background:rgba(91,106,240,.05)}
.day-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .1s}
.day-hdr:active{background:var(--s2)}
.pip{width:9px;height:9px;border-radius:50%;background:var(--bd2);flex-shrink:0}
.pip.today{background:var(--grn);box-shadow:0 0 8px var(--grn)}
.day-meta{flex:1}
.day-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.day-date{font-size:11px;color:var(--txt3);font-family:var(--mono);font-weight:400}
.today-tag{font-size:10px;font-weight:600;color:var(--grn);background:var(--grn-dim);padding:1px 7px;border-radius:20px}
.day-cnt{font-size:11px;color:var(--txt3);font-family:var(--mono)}
.chev{font-size:10px;color:var(--txt3);transition:transform .2s;margin-left:4px}
.day-card.collapsed .chev{transform:rotate(-90deg)}
.day-card.collapsed .day-body{display:none}
.day-body{padding:4px 12px 12px}

/* ── task item ── */
.task-item{display:flex;align-items:flex-start;gap:8px;padding:8px 7px;border-radius:var(--rs);border:1px solid transparent;margin-bottom:4px;transition:background .1s,border-color .1s;position:relative}
.task-item:hover{background:var(--s2);border-color:var(--bd)}
.task-item.drag-src{opacity:.25}
.drag-handle{color:var(--txt3);font-size:14px;cursor:grab;flex-shrink:0;margin-top:2px;padding:1px 3px;border:none;background:none;touch-action:none;line-height:1;transition:color .15s}
.drag-handle:hover{color:var(--txt2)}
.drag-handle:active{cursor:grabbing}
.icon-btn{font-size:15px;flex-shrink:0;cursor:pointer;margin-top:1px;border:none;background:none;padding:0;line-height:1;position:relative}
.task-body{flex:1;min-width:0}

/* ── markdown render ── */
.md-render{font-size:14px;line-height:1.7;color:var(--txt);word-break:break-word;cursor:text}
.md-render p{margin:0 0 4px}
.md-render p:last-child{margin-bottom:0}
.md-render strong{color:#fff;font-weight:700}
.md-render em{color:#c8cce8;font-style:italic}
.md-render del{color:var(--txt3)}
.md-render code{font-family:var(--mono);font-size:12px;background:var(--s3);border:1px solid var(--bd);padding:1px 5px;border-radius:4px;color:#a8d8ff}
.md-render pre{background:var(--s3);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 12px;overflow-x:auto;margin:6px 0}
.md-render pre code{background:none;border:none;padding:0;font-size:12px;color:#a8d8ff}
.md-render a{color:var(--acc-h);text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.md-render a:hover{color:#fff}
.md-render h1{font-size:18px;font-weight:700;color:#fff;margin:4px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.md-render h2{font-size:16px;font-weight:700;color:#eee;margin:4px 0 5px}
.md-render h3{font-size:15px;font-weight:600;color:#ddd;margin:3px 0 4px}
.md-render ul{padding-left:18px;margin:4px 0}
.md-render ol{padding-left:18px;margin:4px 0}
.md-render li{margin:2px 0;line-height:1.6}
.md-render blockquote{border-left:3px solid var(--acc);padding:4px 10px;color:var(--txt2);margin:6px 0;background:var(--s2);border-radius:0 var(--rs) var(--rs) 0}
.md-render hr{border:none;border-top:1px solid var(--bd);margin:8px 0}
/* table */
.md-render table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0;border-radius:var(--rs);overflow:hidden;border:1px solid var(--bd)}
.md-render th{background:var(--s3);color:var(--txt);font-weight:600;padding:7px 10px;text-align:left;border-bottom:1px solid var(--bd2);border-right:1px solid var(--bd)}
.md-render td{padding:6px 10px;border-bottom:1px solid var(--bd);border-right:1px solid var(--bd);color:var(--txt2);vertical-align:top}
.md-render th:last-child,.md-render td:last-child{border-right:none}
.md-render tr:last-child td{border-bottom:none}
.md-render tr:hover td{background:var(--s2);color:var(--txt)}
/* checklist in render */
.md-render input[type=checkbox]{accent-color:var(--acc);width:14px;height:14px;cursor:pointer;margin-right:5px;vertical-align:middle}

.task-subs{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.sub-row{display:flex;align-items:flex-start;gap:7px;font-size:13px;color:var(--txt2);line-height:1.55}
.sub-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--bd2);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .15s}
.sub-cb.on{background:var(--acc);border-color:var(--acc)}
.sub-txt.done{text-decoration:line-through;color:var(--txt3)}

.task-acts{display:none;gap:3px;flex-shrink:0;align-items:flex-start;padding-top:1px}
.task-item:hover .task-acts{display:flex}
.tact{width:24px;height:24px;border-radius:5px;border:none;background:transparent;color:var(--txt3);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tact:hover{background:var(--s3);color:var(--txt2)}
.tact.del:hover{background:var(--red-dim);color:var(--red)}

.add-row{display:flex;align-items:center;gap:7px;padding:8px 7px;color:var(--txt3);font-size:13px;cursor:pointer;border-radius:var(--rs);border:1px dashed transparent;transition:all .15s;-webkit-user-select:none;user-select:none;width:100%;background:none;text-align:left;margin-top:5px}
.add-row:hover{background:var(--s2);border-color:var(--bd);color:var(--txt2)}

/* ── editor ── */
.task-editor{background:var(--s2);border:1px solid var(--acc);border-radius:var(--rs);margin-bottom:5px;overflow:hidden}

/* toolbar */
.ed-toolbar{display:flex;flex-wrap:wrap;gap:3px;padding:7px 10px;background:var(--s3);border-bottom:1px solid var(--bd)}
.etool{height:28px;min-width:28px;padding:0 7px;border-radius:5px;background:var(--s2);border:1px solid var(--bd);color:var(--txt2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--mono);white-space:nowrap;-webkit-user-select:none;user-select:none;gap:4px}
.etool:hover{background:var(--bd2);color:var(--txt)}
.etool:active{transform:scale(.92)}
.etool.active{background:var(--acc-dim);border-color:var(--acc);color:var(--acc-h)}
.etool-sep{width:1px;height:20px;background:var(--bd);margin:0 2px;flex-shrink:0;align-self:center}

/* textarea */
.ed-textarea{width:100%;background:transparent;border:none;color:var(--txt);font-size:14px;font-family:var(--font);outline:none;resize:none;line-height:1.7;padding:10px 12px;min-height:100px}
.ed-textarea::placeholder{color:var(--txt3)}

/* preview */
.ed-preview{padding:10px 12px;border-top:1px solid var(--bd);background:rgba(0,0,0,.15)}
.ed-preview-label{font-size:10px;color:var(--txt3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}

/* subs in editor */
.ed-subs{padding:8px 12px;border-top:1px solid var(--bd)}
.ed-subs-label{font-size:10px;color:var(--txt3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.ed-sub-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.ed-cb{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--bd2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .15s}
.ed-cb.on{background:var(--acc);border-color:var(--acc)}
.ed-sub-in{flex:1;background:transparent;border:none;border-bottom:1px solid var(--bd);color:var(--txt2);font-size:13px;font-family:var(--font);outline:none;padding:3px 0;line-height:1.5;transition:border-color .15s}
.ed-sub-in:focus{border-color:var(--acc);color:var(--txt)}
.ed-sub-del{color:var(--txt3);font-size:11px;cursor:pointer;padding:2px;border:none;background:none;transition:color .1s;flex-shrink:0}
.ed-sub-del:hover{color:var(--red)}

.ed-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--s3);border-top:1px solid var(--bd)}
.ed-add-sub{font-size:12px;color:var(--txt3);cursor:pointer;border:none;background:none;display:flex;align-items:center;gap:4px;transition:color .15s;font-family:var(--font)}
.ed-add-sub:hover{color:var(--txt2)}
.ed-btns{display:flex;gap:6px}
.ebtn{padding:6px 14px;border-radius:var(--rs);font-size:13px;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;font-weight:500}
.ebtn:active{transform:scale(.95)}
.ebtn-c{background:var(--s1);color:var(--txt2);border:1px solid var(--bd)}
.ebtn-s{background:var(--acc);color:#fff}
.ebtn-s:hover{background:var(--acc-h)}

/* ── move modal ── */
.move-modal{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.move-modal.open{opacity:1;pointer-events:all}
.move-sheet{width:100%;max-width:500px;background:var(--s1);border-radius:20px 20px 0 0;border:1px solid var(--bd);border-bottom:none;padding:20px 20px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.move-modal.open .move-sheet{transform:translateY(0)}
.move-handle{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 16px}
.move-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--txt)}
.move-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.move-day-btn{padding:8px 4px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--bd);color:var(--txt2);font-size:11px;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--font)}
.move-day-btn:hover{background:var(--acc-dim);border-color:var(--acc);color:var(--acc-h)}
.move-day-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.move-day-btn.today-day{border-color:var(--grn)}
.mday-wk{font-weight:700;font-size:12px;display:block}
.mday-dt{font-size:10px;font-family:var(--mono);opacity:.7;display:block;margin-top:1px}

/* ── kanban ── */
.kb-hdr{padding:11px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.kb-hdr-txt{font-size:10px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3)}
.klane{border-bottom:1px solid var(--bd);padding:10px 12px;min-height:90px;transition:background .15s}
.klane.drag-over{background:var(--acc-dim);border-left:2px solid var(--acc)}
.klane-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.klane-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.klane-name{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.klane-cnt{margin-left:auto;font-size:10px;color:var(--txt3);font-family:var(--mono);background:var(--s3);padding:1px 6px;border-radius:10px}
.lane-inprogress .klane-pip{background:var(--ylw)}.lane-inprogress .klane-name{color:var(--ylw)}
.lane-done .klane-pip{background:var(--grn)}.lane-done .klane-name{color:var(--grn)}
.lane-discuss .klane-pip{background:var(--blu)}.lane-discuss .klane-name{color:var(--blu)}
.lane-plan .klane-pip{background:var(--txt3)}.lane-plan .klane-name{color:var(--txt2)}
.kcard{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:9px 11px;margin-bottom:7px;cursor:grab;transition:border-color .15s,transform .1s;position:relative;touch-action:none}
.kcard:hover{border-color:var(--bd2);transform:translateY(-1px)}
.kcard:active{cursor:grabbing}
.kcard.drag-src{opacity:.25}
.kcard-day{font-size:10px;color:var(--txt3);font-family:var(--mono);margin-bottom:3px}
.kcard-txt{font-size:12px;line-height:1.55;color:var(--txt);padding-right:18px;word-break:break-word}
.kcard-del{position:absolute;top:7px;right:7px;width:18px;height:18px;border-radius:4px;background:none;border:none;color:var(--txt3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.kcard:hover .kcard-del{opacity:1}
.kcard-del:hover{background:var(--red-dim);color:var(--red)}
.klane-empty{color:var(--txt3);font-size:11px;text-align:center;padding:16px 0;border:1px dashed var(--bd);border-radius:var(--rs)}

/* icon picker */
.icon-picker{position:absolute;top:26px;left:0;z-index:80;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--rs);padding:7px;display:flex;flex-wrap:wrap;gap:4px;width:170px;box-shadow:0 12px 32px rgba(0,0,0,.6)}
.icon-opt{font-size:17px;cursor:pointer;padding:4px 5px;border-radius:4px;transition:background .1s;border:none;background:none}
.icon-opt:hover{background:var(--s3)}

/* ghost */
#ghost{position:fixed;z-index:9999;pointer-events:none;background:var(--s2);border:1px solid var(--acc);border-radius:var(--rs);padding:8px 12px;font-size:12px;color:var(--txt);max-width:200px;opacity:.92;transform:rotate(1.5deg);box-shadow:0 10px 32px rgba(0,0,0,.7);display:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* FAB */
.fab{position:fixed;right:20px;bottom:calc(16px + env(safe-area-inset-bottom));width:50px;height:50px;border-radius:50%;background:var(--acc);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:40;box-shadow:0 4px 20px rgba(91,106,240,.45);border:none;transition:transform .15s,bottom .3s;-webkit-user-select:none;user-select:none}
.fab:active{transform:scale(.9)}
.fab.up{bottom:calc(65vh + 16px)}
@media(min-width:681px){.fab{display:none}}

/* loading */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:12px;transition:opacity .4s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loader{width:32px;height:32px;border:2px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--txt3);font-family:var(--mono)}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-txt">連線中…</div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-brand">
      <span class="tb-logo">Planner</span>
      <div class="tb-info">
        <div class="tb-week"><span id="tbWeek">—</span><div class="sync-dot" id="syncDot"></div></div>
        <div class="tb-sub" id="tbSub"></div>
      </div>
    </div>
    <div class="tb-nav">
      <button class="nbtn" onclick="chgWeek(-1)">‹</button>
      <button class="nbtn today" onclick="chgWeek(0)">今</button>
      <button class="nbtn" onclick="chgWeek(1)">›</button>
    </div>
  </div>

  <div class="panes">
    <div class="pane-days"><div class="scroll" id="daysScroll"></div></div>
    <div class="pane-kb" id="paneKb">
      <div class="kb-hdr"><div class="kb-hdr-txt">看板 Kanban</div></div>
      <div class="kscroll" id="kbScroll"></div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item active" id="tab-d" onclick="mTab('d')"><div class="tab-icon">📅</div>週誌</div>

function mdRender(src){
  if(!src)return'';
  // support - [ ] and - [x] checklists
  const processed=src.replace(/^- \[( |x)\] /gm,(m,c)=>`<li class="task-list-item"><input type="checkbox" ${c==='x'?'checked':''} onclick="return false"> `);
  try{
    return DOMPurify.sanitize(marked.parse(src),{
      ADD_ATTR:['target','onclick'],
      FORBID_TAGS:['script'],
    });
  }catch{return src}
}

/* ══ constants ══ */
const WD=['一','二','三','四','五','六','日'];
const ICONS=['🚩','📋','🔧','💬','📝','✅','⚠️','🔍','📊','🎯','🌟','🔥'];
const LANES=[{id:'inprogress',label:'進行中'},{id:'done',label:'已完成'},{id:'discuss',label:'待討論'},{id:'plan',label:'待規劃'}];

/* ══ date helpers ══ */
function monday(off=wkOff){const n=new Date(),d=n.getDay(),df=d===0?-6:1-d;const m=new Date(n);m.setDate(n.getDate()+df+off*7);m.setHours(0,0,0,0);return m}
function isoWk(d){const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-dn);const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-y)/86400000)+1)/7)}
function wkKey(off=wkOff){const m=monday(off);return`${m.getFullYear()}-W${String(isoWk(m)).padStart(2,'0')}`}
function dKey(d){return d.toISOString().slice(0,10)}
function dayLbl(dk){const d=new Date(dk);const di=d.getDay()===0?6:d.getDay()-1;return`${d.getMonth()+1}/${d.getDate()} 週${WD[di]}`}

/* ══ sync indicators ══ */
function setSyncLive(v){document.getElementById('syncDot').className='sync-dot'+(v?' live':'')}
function setSyncing(){document.getElementById('syncDot').className='sync-dot saving';clearTimeout(syncTimer);syncTimer=setTimeout(()=>setSyncLive(true),2000)}

/* ══ load & subscribe ══ */
async function loadData(){
  const wk=wkKey();
  const[tr,kr]=await Promise.all([
    sb.from('tasks').select('*').eq('week_key',wk).order('position'),
    sb.from('kanban_cards').select('*').eq('week_key',wk).order('position'),
  ]);
  tasks=tr.data||[];kCards=kr.data||[];
  document.getElementById('loadingOverlay').classList.add('hidden');
  setSyncLive(true);render();
}

function subscribeRealtime(){
  sb.channel('db-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>loadData())
    .on('postgres_changes',{event:'*',schema:'public',table:'kanban_cards'},()=>loadData())
    .subscribe(s=>setSyncLive(s==='SUBSCRIBED'));
}

/* ══ render ══ */
function render(){
  const wk=wkKey();const mon=monday();
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const f=d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('tbWeek').textContent=`第 ${isoWk(mon)} 週`;
  document.getElementById('tbSub').textContent=`${mon.getFullYear()}  ${f(mon)} – ${f(sun)}`;
  renderDays(wk,mon);renderKb(wk);
}

function renderDays(wk,mon){
  const col=document.getElementById('daysScroll');col.innerHTML='';
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const dk=dKey(d),isToday=d.getTime()===today.getTime();
    const dayTasks=tasks.filter(t=>t.day_key===dk).sort((a,b)=>a.position-b.position);

    const card=document.createElement('div');card.className='day-card'+(isToday?' today-card':'');
    card.dataset.dk=dk;

    const hdr=document.createElement('div');hdr.className='day-hdr';
    hdr.innerHTML=`<div class="pip${isToday?' today':''}"></div>
      <div class="day-meta"><div class="day-name">週${WD[i]}<span class="day-date">${d.getMonth()+1}/${d.getDate()}</span>${isToday?'<span class="today-tag">今天</span>':''}</div></div>
      <span class="day-cnt">${dayTasks.length}</span><span class="chev">▾</span>`;
    hdr.onclick=()=>card.classList.toggle('collapsed');
    card.appendChild(hdr);

    const body=document.createElement('div');body.className='day-body';
    // cross-day drop
    body.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-target-day')});
    body.addEventListener('dragleave',()=>card.classList.remove('drag-target-day'));
    body.addEventListener('drop',e=>{e.preventDefault();card.classList.remove('drag-target-day');if(drag.on&&drag.type==='task'&&drag.data.task.day_key!==dk)moveTaskDay(drag.data.task,dk,wk)});
    body.addEventListener('mouseup',()=>{card.classList.remove('drag-target-day');if(drag.on&&drag.type==='task'&&drag.data.task.day_key!==dk)moveTaskDay(drag.data.task,dk,wk)});

    dayTasks.forEach(t=>{
      if(editId===t.id)body.appendChild(makeEditor(t,dk,wk));
      else body.appendChild(makeTaskEl(t,dk,wk));
    });
    const addBtn=document.createElement('button');addBtn.className='add-row';addBtn.textContent='＋ 新增任務';
    addBtn.onclick=()=>addTask(dk,wk);
    body.appendChild(addBtn);
    card.appendChild(body);
    if(i>=5&&!isToday&&dayTasks.length===0)card.classList.add('collapsed');
    col.appendChild(card);
  }
}

/* ── task element ── */
function makeTaskEl(task,dk,wk){
  const item=document.createElement('div');item.className='task-item';

  const handle=document.createElement('button');handle.className='drag-handle';handle.textContent='⠿';handle.title='拖曳到看板或其他天';
  setupTaskDrag(handle,task,dk);item.appendChild(handle);

  const iconBtn=document.createElement('button');iconBtn.className='icon-btn';iconBtn.textContent=task.icon||'📋';
  iconBtn.onclick=e=>{e.stopPropagation();openIcons(iconBtn,task,dk,wk)};
  item.appendChild(iconBtn);

  const body=document.createElement('div');body.className='task-body';

  // markdown render — links are clickable
  const mdEl=document.createElement('div');mdEl.className='md-render';
  mdEl.innerHTML=mdRender(task.text||'');
  // open links in new tab
  mdEl.querySelectorAll('a').forEach(a=>{a.target='_blank';a.rel='noopener noreferrer'});
  mdEl.onclick=e=>{if(e.target.tagName==='A')return;startEdit(task.id,dk,wk)};
  body.appendChild(mdEl);

  // subs (checklist)
  const subs=task.subs||[];
  if(subs.length){
    const subsEl=document.createElement('div');subsEl.className='task-subs';
    subs.forEach((s,si)=>{
      const row=document.createElement('div');row.className='sub-row';
      const cb=document.createElement('div');cb.className='sub-cb'+(s.checked?' on':'');if(s.checked)cb.textContent='✓';
      cb.onclick=e=>{e.stopPropagation();toggleSub(task,si,wk)};
      const txt=document.createElement('span');txt.className='sub-txt'+(s.checked?' done':'');txt.textContent=s.text;
      row.appendChild(cb);row.appendChild(txt);subsEl.appendChild(row);
    });
    body.appendChild(subsEl);
  }
  item.appendChild(body);

  const acts=document.createElement('div');acts.className='task-acts';
  const eBtn=mkTact('✏️','編輯',()=>startEdit(task.id,dk,wk));
  const mvBtn=mkTact('📅','移到其他天',()=>openMoveModal(task,wk));
  const dBtn=mkTact('✕','刪除');dBtn.classList.add('del');
  dBtn.onclick=e=>{e.stopPropagation();deleteTask(task.id,wk)};
  acts.appendChild(eBtn);acts.appendChild(mvBtn);acts.appendChild(dBtn);
  item.appendChild(acts);
  return item;
}

function mkTact(txt,title,fn){
  const b=document.createElement('button');b.className='tact';b.textContent=txt;b.title=title;
  if(fn)b.onclick=e=>{e.stopPropagation();fn()};return b;

/* ── editor ── */
function makeEditor(task,dk,wk){
  const wrap=document.createElement('div');wrap.className='task-editor';

  // toolbar
  const tb=document.createElement('div');tb.className='ed-toolbar';

  let ta; // textarea ref, assigned below

  const tools=[
    {l:'H1',t:'大標題',ins:'# '},
    {l:'H2',t:'中標題',ins:'## '},
    {l:'H3',t:'小標題',ins:'### '},
    null,
    {l:'B',t:'粗體',wrap:['**','**']},
    {l:'I',t:'斜體',wrap:['*','*']},
    {l:'~~',t:'刪除線',wrap:['~~','~~']},
    {l:'`',t:'行內程式碼',wrap:['`','`']},
    null,
    {l:'🔗',t:'連結 [文字](網址)',ins:'[顯示文字](https://)'},
    {l:'☑',t:'勾選項目',ins:'- [ ] '},
    {l:'•',t:'無序清單',ins:'- '},
    {l:'1.',t:'有序清單',ins:'1. '},
    null,
    {l:'==',t:'螢光筆（粗體代替）',wrap:['**`','`**']},
    {l:'> ',t:'引言',ins:'> '},
    {l:'---',t:'分隔線',ins:'\n---\n'},
    {l:'表格',t:'插入表格範本',ins:'| 欄位1 | 欄位2 | 欄位3 |\n| --- | --- | --- |\n| 內容 | 內容 | 內容 |\n'},
    {l:'```',t:'程式碼區塊',wrap:['```\n','```\n']},
  ];

  tools.forEach(tool=>{
    if(!tool){const sep=document.createElement('div');sep.className='etool-sep';tb.appendChild(sep);return}
    const btn=document.createElement('button');btn.className='etool';btn.textContent=tool.l;btn.title=tool.t;btn.type='button';
    btn.onmousedown=e=>{
      e.preventDefault();
      if(!ta)return;
      const s=ta.selectionStart,en=ta.selectionEnd,val=ta.value;
      if(tool.wrap){
        const sel=val.slice(s,en)||'文字';
        const newVal=val.slice(0,s)+tool.wrap[0]+sel+tool.wrap[1]+val.slice(en);
        ta.value=newVal;ta.focus();
        ta.selectionStart=s+tool.wrap[0].length;
        ta.selectionEnd=s+tool.wrap[0].length+sel.length;
      } else if(tool.ins){
        const newVal=val.slice(0,s)+tool.ins+val.slice(s);
        ta.value=newVal;ta.focus();
        ta.selectionStart=ta.selectionEnd=s+tool.ins.length;
      }
      updatePreview();
    };
    btn.ontouchend=e=>{e.preventDefault();btn.onmousedown(e)};
    tb.appendChild(btn);
  });
  wrap.appendChild(tb);

  // textarea
  ta=document.createElement('textarea');ta.className='ed-textarea';ta.value=task.text||'';
  ta.placeholder='使用 Markdown 格式輸入…\n\n**粗體** *斜體* ~~刪除線~~\n[連結文字](https://...)\n- 列點  | 表格 |\n- [ ] 勾選項目';
  ta.oninput=()=>{autoResize(ta);updatePreview()};
  ta.onkeydown=e=>{if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(s);ta.selectionStart=ta.selectionEnd=s+2;updatePreview()}};
  wrap.appendChild(ta);

  // live preview
  const prevWrap=document.createElement('div');prevWrap.className='ed-preview';
  const prevLabel=document.createElement('div');prevLabel.className='ed-preview-label';prevLabel.textContent='預覽';
  const prevEl=document.createElement('div');prevEl.className='md-render';
  prevWrap.appendChild(prevLabel);prevWrap.appendChild(prevEl);
  wrap.appendChild(prevWrap);

  function updatePreview(){
    prevEl.innerHTML=mdRender(ta.value);
    prevEl.querySelectorAll('a').forEach(a=>{a.target='_blank';a.rel='noopener noreferrer'});
  }
  updatePreview();

  // subs
  const subData=(task.subs||[]).map(s=>({...s}));
  const subsWrap=document.createElement('div');subsWrap.className='ed-subs';
  const subsLabel=document.createElement('div');subsLabel.className='ed-subs-label';subsLabel.textContent='勾選項目';
  subsWrap.appendChild(subsLabel);
  wrap.appendChild(subsWrap);

  function renderSubRows(){
    const rows=subsWrap.querySelectorAll('.ed-sub-row');rows.forEach(r=>r.remove());
    subData.forEach((s,i)=>{
      const row=document.createElement('div');row.className='ed-sub-row';
      const cb=document.createElement('div');cb.className='ed-cb'+(s.checked?' on':'');if(s.checked)cb.textContent='✓';
      cb.onclick=()=>{s.checked=!s.checked;cb.className='ed-cb'+(s.checked?' on':'');cb.textContent=s.checked?'✓':''};
      const inp=document.createElement('input');inp.className='ed-sub-in';inp.type='text';inp.value=s.text;inp.placeholder='勾選項目內容…';
      inp.oninput=()=>s.text=inp.value;
      inp.onkeydown=e=>{
        if(e.key==='Enter'){e.preventDefault();subData.splice(i+1,0,{text:'',checked:false});renderSubRows();setTimeout(()=>subsWrap.querySelectorAll('.ed-sub-in')[i+1]?.focus(),40)}
        if(e.key==='Backspace'&&inp.value===''&&subData.length>0){e.preventDefault();subData.splice(i,1);renderSubRows();setTimeout(()=>subsWrap.querySelectorAll('.ed-sub-in')[Math.max(0,i-1)]?.focus(),40)}
      };
      const del=document.createElement('button');del.className='ed-sub-del';del.textContent='✕';del.type='button';
      del.onclick=()=>{subData.splice(i,1);renderSubRows()};
      row.appendChild(cb);row.appendChild(inp);row.appendChild(del);subsWrap.appendChild(row);
    });
  }
  renderSubRows();

  // footer
  const footer=document.createElement('div');footer.className='ed-footer';
  const addSubBtn=document.createElement('button');addSubBtn.className='ed-add-sub';addSubBtn.textContent='＋ 新增勾選項目';addSubBtn.type='button';
  addSubBtn.onclick=()=>{subData.push({text:'',checked:false});renderSubRows();setTimeout(()=>{const ins=subsWrap.querySelectorAll('.ed-sub-in');ins[ins.length-1]?.focus()},40)};
  const btns=document.createElement('div');btns.className='ed-btns';
  const cBtn=document.createElement('button');cBtn.className='ebtn ebtn-c';cBtn.textContent='取消';cBtn.type='button';
  cBtn.onclick=()=>{editId=null;renderDays(wk,monday())};
  const sBtn=document.createElement('button');sBtn.className='ebtn ebtn-s';sBtn.textContent='儲存';sBtn.type='button';
  sBtn.onclick=async()=>{
    task.text=ta.value;task.subs=subData.filter(s=>s.text.trim());
    editId=null;setSyncing();
    await sb.from('tasks').update({text:task.text,subs:task.subs}).eq('id',task.id);
    await loadData();
  };
  btns.appendChild(cBtn);btns.appendChild(sBtn);footer.appendChild(addSubBtn);footer.appendChild(btns);wrap.appendChild(footer);

  setTimeout(()=>{autoResize(ta);ta.focus();updatePreview()},60);
  return wrap;
}

function autoResize(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,400)+'px'}

/* ── CRUD ── */
async function addTask(dk,wk){
  const t={id:uid(),week_key:wk,day_key:dk,icon:'🚩',text:'',done:false,subs:[],position:tasks.filter(x=>x.day_key===dk).length};
  tasks.push(t);editId=t.id;
  renderDays(wk,monday());
  setTimeout(()=>document.querySelector('.task-editor')?.scrollIntoView({block:'nearest',behavior:'smooth'}),80);
  setSyncing();await sb.from('tasks').insert(t);
}
async function deleteTask(tid,wk){tasks=tasks.filter(t=>t.id!==tid);if(editId===tid)editId=null;renderDays(wk,monday());setSyncing();await sb.from('tasks').delete().eq('id',tid)}
async function toggleSub(task,si,wk){task.subs[si].checked=!task.subs[si].checked;renderDays(wk,monday());setSyncing();await sb.from('tasks').update({subs:task.subs}).eq('id',task.id)}
function startEdit(tid,dk,wk){if(editId===tid)return;editId=tid;renderDays(wk,monday());setTimeout(()=>document.querySelector('.task-editor')?.scrollIntoView({block:'nearest',behavior:'smooth'}),80)}
async function moveTaskDay(task,newDk,wk){task.day_key=newDk;setSyncing();await sb.from('tasks').update({day_key:newDk}).eq('id',task.id);await loadData()}
function quickAdd(){const today=new Date();today.setHours(0,0,0,0);const mon=monday();const dk2=dKey(today)>=dKey(mon)?dKey(today):dKey(mon);addTask(dk2,wkKey());if(mView!=='d')mTab('d')}

/* icon picker */
let pickerEl=null;
function openIcons(btn,task,dk,wk){
  closePicker();
  const p=document.createElement('div');p.className='icon-picker';
  ICONS.forEach(ic=>{const b=document.createElement('button');b.className='icon-opt';b.textContent=ic;b.onclick=async()=>{task.icon=ic;closePicker();setSyncing();await sb.from('tasks').update({icon:ic}).eq('id',task.id);renderDays(wk,monday())};p.appendChild(b)});
  btn.appendChild(p);pickerEl=p;setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),10);
}
function closePicker(){if(pickerEl){pickerEl.remove();pickerEl=null}}

/* move modal */
function openMoveModal(task,wk){
  moveTaskRef={task,wk};
  const mon=monday();const today=new Date();today.setHours(0,0,0,0);
  const grid=document.getElementById('moveDays');grid.innerHTML='';
  document.getElementById('moveTitle').textContent=`移動到哪一天？`;
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);const dk=dKey(d);
    const btn=document.createElement('button');btn.className='move-day-btn'+(dk===task.day_key?' active':'')+(d.getTime()===today.getTime()?' today-day':'');
    btn.innerHTML=`<span class="mday-wk">週${WD[i]}</span><span class="mday-dt">${d.getMonth()+1}/${d.getDate()}</span>`;
    btn.onclick=async()=>{if(dk!==moveTaskRef.task.day_key){await moveTaskDay(moveTaskRef.task,dk,moveTaskRef.wk)}closeMoveModal()};
    grid.appendChild(btn);
  }
  document.getElementById('moveModal').classList.add('open');
}
function closeMoveModal(){document.getElementById('moveModal').classList.remove('open');moveTaskRef=null}
document.getElementById('moveModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeMoveModal()});

/* kanban */
function renderKb(wk=wkKey()){
  const scroll=document.getElementById('kbScroll');scroll.innerHTML='';
  LANES.forEach(({id,label})=>{
    const cards=kCards.filter(c=>c.lane===id).sort((a,b)=>a.position-b.position);
    const lane=document.createElement('div');lane.className=`klane lane-${id}`;lane.id=`klane-${id}`;
    lane.innerHTML=`<div class="klane-hdr"><div class="klane-pip"></div><div class="klane-name">${label}</div><div class="klane-cnt">${cards.length}</div></div>`;
    setupLaneDrop(lane,id,wk);
    if(!cards.length){const em=document.createElement('div');em.className='klane-empty';em.textContent='拖曳任務至此';lane.appendChild(em)}
    else cards.forEach(c=>lane.appendChild(makeKCard(c,id,wk)));
    scroll.appendChild(lane);
  });
}
function makeKCard(card,lane,wk){
  const el=document.createElement('div');el.className='kcard';
  el.innerHTML=`<div class="kcard-day">${card.day_label||''}</div><div class="kcard-txt">${card.icon||''} ${card.text}</div>`;
  const del=document.createElement('button');del.className='kcard-del';del.textContent='✕';
  del.onclick=async e=>{e.stopPropagation();kCards=kCards.filter(c=>c.id!==card.id);renderKb(wk);setSyncing();await sb.from('kanban_cards').delete().eq('id',card.id)};
  el.appendChild(del);setupCardDrag(el,card,lane,wk);return el;
}

/* ══ drag ══ */
const ghost=document.getElementById('ghost');
const showG=(txt,x,y)=>{ghost.textContent=txt;ghost.style.display='block';mvG(x,y)};
const mvG=(x,y)=>{ghost.style.left=(x+14)+'px';ghost.style.top=(y-18)+'px'};
const hideG=()=>ghost.style.display='none';
const coo=e=>{if(e.touches?.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};if(e.changedTouches?.length)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};return{x:e.clientX,y:e.clientY}};

function setupTaskDrag(handle,task,dk){
  handle.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    const item=handle.closest('.task-item');
    drag={on:true,type:'task',data:{task,dk},el:item};
    item.classList.add('drag-src');
    showG((task.icon||'')+'  '+(task.text||'').replace(/[#*`~\[\]]/g,'').slice(0,30),e.clientX,e.clientY);
    e.preventDefault();e.stopPropagation();
    if(window.innerWidth<=680&&mView!=='k')mTab('k',true);
  });
  let tt;
  handle.addEventListener('touchstart',e=>{
    const{x,y}=coo(e);
    tt=setTimeout(()=>{
      const item=handle.closest('.task-item');
      drag={on:true,type:'task',data:{task,dk},el:item};
      item.classList.add('drag-src');
      showG((task.icon||'')+' '+(task.text||'').replace(/[#*`~\[\]]/g,'').slice(0,30),x,y);
      if(navigator.vibrate)navigator.vibrate(30);
      if(window.innerWidth<=680&&mView!=='k')mTab('k',true);
    },280);
  },{passive:true});
  handle.addEventListener('touchmove',e=>{clearTimeout(tt);if(!drag.on)return;const{x,y}=coo(e);mvG(x,y);e.preventDefault()},{passive:false});
  handle.addEventListener('touchend',e=>{
    clearTimeout(tt);if(!drag.on||drag.type!=='task'){drag.on=false;return}
    const{x,y}=coo(e);const lid=laneAt(x,y);
    if(lid)dropToLane(drag.data.task,drag.data.dk,lid);
    endDrag();
  });
}

function setupCardDrag(el,card,lane,wk){
  el.addEventListener('mousedown',e=>{
    if(e.button!==0||e.target.classList.contains('kcard-del'))return;
    drag={on:true,type:'card',data:{card,fromLane:lane,wk},el};
    el.classList.add('drag-src');showG((card.icon||'')+' '+card.text,e.clientX,e.clientY);e.preventDefault();
  });
  let tt2;
  el.addEventListener('touchstart',e=>{
    if(e.target.classList.contains('kcard-del'))return;
    const{x,y}=coo(e);
    tt2=setTimeout(()=>{drag={on:true,type:'card',data:{card,fromLane:lane,wk},el};el.classList.add('drag-src');showG((card.icon||'')+' '+card.text,x,y);if(navigator.vibrate)navigator.vibrate(30)},280);
  },{passive:true});
  el.addEventListener('touchmove',e=>{clearTimeout(tt2);if(!drag.on)return;const{x,y}=coo(e);mvG(x,y);e.preventDefault()},{passive:false});
  el.addEventListener('touchend',e=>{
    clearTimeout(tt2);if(!drag.on||drag.type!=='card'){drag.on=false;return}
    const{x,y}=coo(e);const lid=laneAt(x,y);
    if(lid&&lid!==lane)moveCard(card,lane,lid,wk);
    endDrag();
  });
}

function setupLaneDrop(lane,id,wk){
  lane.addEventListener('mouseover',()=>{if(drag.on)lane.classList.add('drag-over')});
  lane.addEventListener('mouseout',()=>lane.classList.remove('drag-over'));
  lane.addEventListener('mouseup',()=>{
    lane.classList.remove('drag-over');if(!drag.on)return;
    if(drag.type==='task')dropToLane(drag.data.task,drag.data.dk,id,wk);
    else if(drag.type==='card'&&drag.data.fromLane!==id)moveCard(drag.data.card,drag.data.fromLane,id,wk);
    endDrag();
  });
}

function laneAt(x,y){for(const{id}of LANES){const el=document.getElementById('klane-'+id);if(!el)continue;const r=el.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return id}return null}

async function dropToLane(task,dk,lid,wk=wkKey()){
  const c={id:uid(),week_key:wk,lane:lid,icon:task.icon||'📋',text:(task.text||'').replace(/[#*`~\[\]>]/g,'').slice(0,80).trim(),day_label:dayLbl(dk),task_id:task.id,position:kCards.filter(x=>x.lane===lid).length};
  kCards.push(c);renderKb(wk);setSyncing();await sb.from('kanban_cards').insert(c);
}
async function moveCard(card,from,to,wk=wkKey()){
  card.lane=to;kCards=kCards.map(c=>c.id===card.id?{...c,lane:to}:c);
  renderKb(wk);setSyncing();await sb.from('kanban_cards').update({lane:to}).eq('id',card.id);
}
function endDrag(){
  if(drag.el)drag.el.classList.remove('drag-src');
  drag={on:false,type:null,data:null,el:null};hideG();
  document.querySelectorAll('.drag-over,.drag-target-day').forEach(e=>e.classList.remove('drag-over','drag-target-day'));
}
document.addEventListener('mousemove',e=>{if(drag.on)mvG(e.clientX,e.clientY)});
document.addEventListener('mouseup',()=>{if(drag.on)endDrag()});

/* mobile tab */
function mTab(v){
  mView=v;const kb=document.getElementById('paneKb'),fab=document.getElementById('fab');
  if(v==='k'){kb.classList.add('open');document.getElementById('tab-d').classList.remove('active');document.getElementById('tab-k').classList.add('active');fab.classList.add('up')}
  else{kb.classList.remove('open');document.getElementById('tab-d').classList.add('active');document.getElementById('tab-k').classList.remove('active');fab.classList.remove('up')}
}

function chgWeek(off){if(off===0)wkOff=0;else wkOff+=off;editId=null;loadData()}

/* init */
loadData();
subscribeRealtime();
</script>
